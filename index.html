}
function renderPlayers(){
  document.getElementById('plist').innerHTML=players.map((p,i)=>`
    <div class="prow">
      <div class="cdot" style="background:${p.color}"></div>
      <input value="${p.name}" oninput="players[${i}].name=this.value||'שחקן ${i+1}'"/>
    </div>`).join('');
}
function startGame(){
  if(!players.length){alert('הוסף לפחות שחקן אחד!');return;}
  players.forEach(p=>totalScores[p.name]=0);
  shuffled=[...BUILDINGS].sort(()=>Math.random()-0.5).slice(0,10);
  roundIdx=0;
  document.getElementById('splash').style.display='none';
  document.getElementById('game').style.display='flex';
  initMap(); beginRound();
}
function initMap(){
  map=L.map('map',{center:[32.0,34.8],zoom:7});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
  map.on('click',e=>{if(gamePhase==='playing')placePin(e.latlng.lat,e.latlng.lng);});
}
function placePin(lat,lng){
  const p=players[turnIdx]; if(!p)return;
  if(currentPin)map.removeLayer(currentPin);
  currentPin=L.circleMarker([lat,lng],{radius:13,fillColor:p.color,color:'white',weight:3,fillOpacity:0.92})
    .addTo(map).bindPopup(p.name).openPopup();
  document.getElementById('gbtn').disabled=false;
}
function beginRound(){
  gamePhase='playing'; roundGuesses=[]; turnIdx=0; hintUsed=false;
  if(currentPin){map.removeLayer(currentPin);currentPin=null;}
  if(correctMarker){map.removeLayer(correctMarker);correctMarker=null;}
  if(lineLayer){map.removeLayer(lineLayer);lineLayer=null;}
  map.setView([32.0,34.8],7);
  const b=shuffled[roundIdx];
  document.getElementById('round-info').textContent=`סיבוב ${roundIdx+1} / ${shuffled.length}`;
  const img=document.getElementById('bimg');
  const fb=document.getElementById('imgfb');
  img.style.display='block'; fb.style.display='none';
  img.onerror=()=>{
    img.style.display='none'; fb.style.display='flex';
    document.getElementById('fbname').textContent=b.name;
    document.getElementById('fbdesc').textContent=b.hint;
  };
  img.src=b.url;
  document.getElementById('htext').textContent='💡 לחץ לקבלת רמז (−30% ניקוד)';
  document.getElementById('hbtn').disabled=false;
  document.getElementById('gbtn').disabled=true;
  updateScoreboard(); activateTurn();
}
function activateTurn(){
  const p=players[turnIdx];
  if(!p){endRound();return;}
  hintUsed=false;
  if(currentPin){map.removeLayer(currentPin);currentPin=null;}
  document.getElementById('htext').textContent='💡 לחץ לקבלת רמז (−30% ניקוד)';
  document.getElementById('hbtn').disabled=false;
  document.getElementById('gbtn').disabled=true;
  const pn=document.getElementById('pname');
  pn.textContent=`🎯 תור של: ${p.name}`; pn.style.color=p.color;
  startTimer();
}
function startTimer(){
  clearInterval(timerInt); timeLeft=60;
  const el=document.getElementById('timer');
  el.textContent=`⏱ ${timeLeft}`; el.style.color='#f59e0b';
  timerInt=setInterval(()=>{
    timeLeft--;
    el.textContent=`⏱ ${timeLeft}`;
    el.style.color=timeLeft<=10?'#ef4444':'#f59e0b';
    if(timeLeft<=0){clearInterval(timerInt);timeExpired();}
  },1000);
}
function timeExpired(){
  if(!currentPin)recordGuess(null,null,null,0);
  else doRecord();
}
function showHint(){
  hintUsed=true;
  document.getElementById('htext').textContent=`💡 ${shuffled[roundIdx].hint}`;
  document.getElementById('hbtn').disabled=true;
}
function submitGuess(){
  if(!currentPin)return;
  clearInterval(timerInt); doRecord();
}
function doRecord(){
  const b=shuffled[roundIdx];
  const ll=currentPin.getLatLng();
  const dist=haversine(ll.lat,ll.lng,b.lat,b.lng);
  let pts=calcPts(dist);
  if(hintUsed)pts=Math.floor(pts*0.7);
  recordGuess(ll.lat,ll.lng,dist,pts);
}
function recordGuess(lat,lng,dist,pts){
  const p=players[turnIdx];
  if(p)roundGuesses.push({player:p,lat,lng,dist,pts,hintUsed});
  if(currentPin){map.removeLayer(currentPin);currentPin=null;}
  document.getElementById('gbtn').disabled=true;
  turnIdx++;
  if(turnIdx<players.length)activateTurn();
  else endRound();
}
function endRound(){
  clearInterval(timerInt); gamePhase='results';
  const b=shuffled[roundIdx];
  correctMarker=L.marker([b.lat,b.lng],{
    icon:L.divIcon({className:'',
      html:`<div style="background:#fbbf24;color:#000;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:0.95rem;border:3px solid white;font-weight:900;">✓</div>`,
      iconSize:[28,28],iconAnchor:[14,14]})
  }).addTo(map).bindPopup(`📍 ${b.name}`).openPopup();
  lineLayer=L.layerGroup().addTo(map);
  const bounds=[[b.lat,b.lng]];
  roundGuesses.forEach(g=>{
    if(g.lat!==null){
      L.circleMarker([g.lat,g.lng],{radius:10,fillColor:g.player.color,color:'white',weight:2,fillOpacity:0.9})
        .addTo(lineLayer).bindPopup(`${g.player.name}: ${Math.round(g.dist)} ק"מ — ${g.pts} נק'`);
      L.polyline([[b.lat,b.lng],[g.lat,g.lng]],{color:g.player.color,weight:2,dashArray:'5,4'}).addTo(lineLayer);
      bounds.push([g.lat,g.lng]);
    }
  });
  if(bounds.length>1)map.fitBounds(L.latLngBounds(bounds),{padding:[40,40]});
  roundGuesses.forEach(g=>{totalScores[g.player.name]=(totalScores[g.player.name]||0)+g.pts;});
  updateScoreboard();
  const sorted=[...roundGuesses].sort((a,c)=>c.pts-a.pts);
  document.getElementById('restitle').textContent=`📍 ${b.name}`;
  document.getElementById('rescards').innerHTML=sorted.map(g=>`
    <div class="rcard">
      <div class="rplayer">
        <div class="rdot" style="background:${g.player.color}"></div>
        <strong>${g.player.name}</strong>
        ${g.hintUsed?'<span style="color:#fbbf24;font-size:0.7rem;margin-right:6px;">💡</span>':''}
      </div>
      <div style="text-align:left">
        <div class="rpts">+${g.pts}</div>
        <div class="rdist">${g.dist!==null?Math.round(g.dist)+' ק"מ':'לא ניחש'}</div>
      </div>
    </div>`).join('');
  document.getElementById('resover').style.display='block';
}
function nextRound(){
  document.getElementById('resover').style.display='none';
  roundIdx++;
  if(roundIdx>=shuffled.length)showFinal();
  else beginRound();
}
function showFinal(){
  gamePhase='final';
  const sorted=players.map(p=>({...p,pts:totalScores[p.name]||0})).sort((a,b)=>b.pts-a.pts);
  document.getElementById('franks').innerHTML=sorted.map((p,i)=>`
    <div class="frank ${i===0?'f1':'fx'}">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="background:${p.color};width:13px;height:13px;border-radius:50%"></div>
        <span>${i===0?'🏆 ':i===1?'🥈 ':i===2?'🥉 ':''}${p.name}</span>
      </div>
      <span>${p.pts} נקודות</span>
    </div>`).join('');
  document.getElementById('finover').style.display='block';
}
function updateScoreboard(){
  document.getElementById('scoreboard').innerHTML=players.map(p=>`
    <div class="schip">
      <div class="sdot" style="background:${p.color}"></div>
      <span>${p.name}: <strong>${totalScores[p.name]||0}</strong></span>
    </div>`).join('');
}
function haversine(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function calcPts(d){
  if(d<0.5)return 500; if(d<2)return Math.round(500-d*50);
  if(d<10)return Math.round(400-d*15); if(d<50)return Math.max(100,Math.round(250-d*3));
  if(d<200)return Math.max(10,Math.round(100-d*0.4)); return 0;
}
addPlayer(); addPlayer();
</script>
