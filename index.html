<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>היכן זה? — רמי וימר אדריכלים</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; font-family:'Segoe UI',Arial,sans-serif; background:#0f172a; color:#f1f5f9; direction:rtl; }
.screen { display:none; position:fixed; inset:0; flex-direction:column; overflow-y:auto; }
.screen.active { display:flex; }

/* SPLASH */
#s-splash { background:linear-gradient(160deg,#0f172a,#1e3a5f); align-items:center; justify-content:center; gap:18px; padding:24px; }
#s-splash h1 { font-size:2.4rem; font-weight:900; color:#38bdf8; text-align:center; }
.sub { color:#94a3b8; font-size:0.95rem; text-align:center; }
.firm { color:#64748b; font-size:0.85rem; font-weight:700; text-align:center; }
.card { background:#1e293b; border-radius:18px; padding:22px; width:100%; max-width:400px; }
.card h2 { color:#38bdf8; margin-bottom:14px; font-size:1rem; }
.big-btn { background:linear-gradient(135deg,#0ea5e9,#6366f1); color:#fff; border:none; border-radius:14px; padding:16px; font-size:1.05rem; font-weight:700; cursor:pointer; width:100%; margin-top:10px; }
.big-btn:active { opacity:0.85; }
.sec-btn { background:#1e293b; color:#94a3b8; border:1px solid #334155; border-radius:14px; padding:14px; font-size:0.95rem; cursor:pointer; width:100%; margin-top:8px; }
.inp { background:#0f172a; border:1px solid #334155; border-radius:10px; padding:13px 14px; color:#f1f5f9; font-size:1rem; width:100%; margin-bottom:10px; }
.inp:focus { outline:none; border-color:#38bdf8; }
.code-display { font-size:3rem; font-weight:900; color:#38bdf8; text-align:center; letter-spacing:12px; margin:12px 0; }
.divider { text-align:center; color:#475569; font-size:0.8rem; margin:4px 0; }

/* FILTER */
#s-filter { background:#0f172a; padding:16px; gap:10px; }
#s-filter h2 { color:#38bdf8; font-size:1.1rem; }
.fsec { background:#1e293b; border-radius:14px; padding:14px; }
.fsec h3 { color:#94a3b8; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.chips { display:flex; flex-wrap:wrap; gap:8px; }
.chip { background:#0f172a; border:1px solid #334155; border-radius:20px; padding:8px 14px; font-size:0.85rem; cursor:pointer; user-select:none; }
.chip.on { background:#0ea5e9; border-color:#0ea5e9; color:#fff; font-weight:600; }
.rounds-row .chip { flex:1; text-align:center; }

/* LOBBY */
#s-lobby { background:#0f172a; align-items:center; justify-content:center; padding:24px; gap:16px; }
.player-list { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
.player-item { display:flex; align-items:center; gap:10px; background:#0f172a; border-radius:10px; padding:10px 14px; }
.pdot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

/* GAME */
#s-game { background:#0f172a; overflow:hidden; }
#game-top { background:#1e293b; padding:8px 12px; display:flex; align-items:center; gap:8px; flex-shrink:0; border-bottom:1px solid #334155; }
.ttitle { font-size:0.85rem; font-weight:700; color:#38bdf8; }
#g-round { font-size:0.75rem; color:#94a3b8; }
#g-timer { font-size:1rem; font-weight:700; color:#f59e0b; margin-right:auto; }
#g-score { font-size:0.8rem; background:#0f172a; border-radius:20px; padding:3px 10px; }

#img-strip { position:relative; width:100%; height:36vw; max-height:190px; flex-shrink:0; overflow:hidden; background:#0f172a; }
#bimg { width:100%; height:100%; object-fit:cover; }
#imgfb { display:none; position:absolute; inset:0; background:linear-gradient(135deg,#0f172a,#1e3a5f); flex-direction:column; align-items:center; justify-content:center; padding:12px; text-align:center; }

#hint-bar { background:#1e2d1a; padding:6px 12px; font-size:0.78rem; color:#fbbf24; display:none; flex-shrink:0; }

#map-area { flex:1; position:relative; min-height:0; }
#map { width:100%; height:100%; }
#map-tip { position:absolute; top:8px; left:50%; transform:translateX(-50%); background:rgba(15,23,42,0.88); color:#94a3b8; padding:4px 12px; border-radius:20px; font-size:0.72rem; z-index:500; pointer-events:none; white-space:nowrap; }

#waiting-overlay { display:none; position:absolute; inset:0; background:rgba(15,23,42,0.92); z-index:600; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
#waiting-overlay.show { display:flex; }
.spinner { width:38px; height:38px; border:3px solid #334155; border-top-color:#38bdf8; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

#bottom-bar { background:#1e293b; padding:10px 12px; display:flex; gap:8px; flex-shrink:0; border-top:1px solid #334155; }
#btn-hint { background:#78350f; color:#fbbf24; border:none; border-radius:10px; padding:10px 14px; font-size:0.8rem; cursor:pointer; flex-shrink:0; white-space:nowrap; }
#btn-hint:disabled { opacity:0.4; }
#btn-guess { background:linear-gradient(135deg,#16a34a,#15803d); color:#fff; border:none; border-radius:10px; padding:10px; font-size:0.9rem; font-weight:700; cursor:pointer; flex:1; }
#btn-guess:disabled { background:#1e3a2e; color:#4b5563; }

/* RESULTS */
#s-results { background:#0f172a; padding:14px; gap:10px; }
#s-results h2 { color:#38bdf8; font-size:1rem; }
.rcard { background:#1e293b; border-radius:12px; padding:11px 14px; display:flex; align-items:center; justify-content:space-between; }
.rplayer { display:flex; align-items:center; gap:8px; font-size:0.88rem; }
.rdot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.rpts { font-size:1.05rem; font-weight:900; color:#38bdf8; }
.rdist { font-size:0.72rem; color:#94a3b8; }

/* FINAL */
#s-final { background:linear-gradient(160deg,#0f172a,#1e3a5f); align-items:center; justify-content:center; padding:24px; gap:14px; }
#s-final h1 { font-size:2rem; color:#fbbf24; text-align:center; }
.frank { padding:12px 18px; border-radius:12px; margin:5px 0; display:flex; align-items:center; justify-content:space-between; font-size:0.95rem; width:100%; max-width:380px; }
.frank.f1 { background:#78350f; color:#fbbf24; font-weight:900; }
.frank.fx { background:#1e293b; }

/* ERROR TOAST */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#ef4444; color:#fff; padding:10px 20px; border-radius:12px; font-size:0.9rem; z-index:9999; display:none; white-space:nowrap; }
</style>
</head>
<body>

<div id="toast"></div>

<!-- SPLASH -->
<div id="s-splash" class="screen active">
  <h1>🏛️ היכן זה?</h1>
  <div class="sub">משחק ניחוש מיקום בניינים</div>
  <div class="firm">רמי וימר אדריכלים בע״מ</div>
  <div class="card">
    <h2>שמך</h2>
    <input class="inp" id="my-name" placeholder="הכנס את שמך" maxlength="20"/>
    <button class="big-btn" onclick="goCreate()">🏠 צור חדר חדש</button>
    <div class="divider">— או —</div>
    <input class="inp" id="join-code" placeholder="קוד חדר (4 תווים)" maxlength="4" style="text-align:center;font-size:1.3rem;letter-spacing:6px;text-transform:uppercase"/>
    <button class="sec-btn" onclick="goJoin()
